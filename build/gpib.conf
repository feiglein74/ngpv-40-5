/***********************************************************************
 *  GPIB.CONF — angepasst für Keysight 82357B + R&S NGPV 40/5
 ***********************************************************************/

interface {
	minor       = 0
	board_type  = "agilent_82357a"
	name        = "gpib0"
	pad         = 0
	sad         = 0
	timeout     = T3s

	eos         = 0x0a
	set-reos    = yes
	set-bin     = no
	set-xeos    = no
	set-eot     = yes

	master      = yes
}

/* R&S NGPV 40/5 — Listener-only Gerät.
 * Default-Adresse vom Werk = 12 (Rückwand-DIP); falls am Gerät anders
 * eingestellt: pad-Wert hier anpassen.
 */
device {
	minor       = 0
	name        = "ngpv"
	pad         = 12
	sad         = 0

	eos         = 0x0a
	set-reos    = no
	set-bin     = no
}
